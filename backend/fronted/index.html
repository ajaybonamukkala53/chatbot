<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Cyber Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background-grid"></div>

<div class="dashboard">

    <!-- LEFT -->

    <aside class="sidebar">

        <h2>AI CORE</h2>

        <div class="panel">

            <h3>System</h3>

            <div class="stat">

                <label>CPU</label>

                <div class="progress">

                    <div class="cpu"></div>

                </div>

            </div>

            <div class="stat">

                <label>Memory</label>

                <div class="progress">

                    <div class="memory"></div>

                </div>

            </div>

            <div class="stat">

                <label>Network</label>

                <div class="progress">

                    <div class="network"></div>

                </div>

            </div>

        </div>

        <div class="panel">

            <h3>Radar</h3>

            <div class="radar">

                <div class="ring r1"></div>

                <div class="ring r2"></div>

                <div class="ring r3"></div>

                <div class="scanner"></div>

            </div>

        </div>

    </aside>

    <!-- CENTER -->

    <main>

        <header>

            <h1>🤖 AI ASSISTANT</h1>

            <p>Groq Powered Chatbot</p>

        </header>

        <section id="messages"></section>

        <div class="input-area">

            <input
            id="userInput"
            placeholder="Ask anything...">

            <button onclick="sendMessage()">

                SEND

            </button>

        </div>

    </main>

    <!-- RIGHT -->

    <aside class="sidebar">

        <h2>OPTIONS</h2>

        <div class="panel">

            <button onclick="clearChat()">

                🗑 Clear

            </button>

            <button onclick="saveChat()">

                💾 Save

            </button>

        </div>

        <div class="panel">

            <h3>History</h3>

            <div id="history"></div>

        </div>

    </aside>

</div>

<script src="script.js"></script>

</body>
</html>
