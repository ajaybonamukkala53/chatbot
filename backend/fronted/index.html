<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groq AI Chatbot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#eef2f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#chat-container{
    width:650px;
    height:700px;
    background:#fff;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

h2{
    text-align:center;
    background:#007bff;
    color:white;
    padding:15px;
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
    background:#fafafa;
}

.msg{
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    max-width:80%;
    white-space:pre-wrap;
}

.user{
    background:#d1e7ff;
    margin-left:auto;
}

.bot{
    background:#ececec;
    margin-right:auto;
}

#input-area{
    display:flex;
    padding:15px;
    gap:10px;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    padding:12px 20px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#controls{
    display:flex;
    justify-content:space-between;
    padding:10px 15px;
}

#history{
    max-height:120px;
    overflow:auto;
    padding:10px;
    border-top:1px solid #ddd;
}

.history-item{
    background:#f1f1f1;
    padding:8px;
    margin:5px 0;
    border-radius:6px;
    cursor:pointer;
}

.history-item:hover{
    background:#ddd;
}
</style>

</head>

<body>

<div id="chat-container">

<h2>🤖 Groq AI Chatbot</h2>

<div id="messages"></div>

<div id="input-area">

<input
id="userInput"
placeholder="Type your message..."
>

<button onclick="sendMessage()">
Send
</button>

</div>

<div id="controls">

<button onclick="clearChat()">
🗑 Clear
</button>

<button onclick="saveChat()">
💾 Save
</button>

</div>

<div id="history"></div>

</div>

<script>

const API_URL="https://chatbot-2-vfrj.onrender.com/chat";

const messages=document.getElementById("messages");
const input=document.getElementById("userInput");
const historyDiv=document.getElementById("history");

let history=[];

function addMessage(text,type){

const div=document.createElement("div");

div.className="msg "+type;

div.textContent=text;

messages.appendChild(div);

messages.scrollTop=messages.scrollHeight;

}

async function sendMessage(){

const message=input.value.trim();

if(message==="") return;

addMessage(message,"user");

input.value="";

const loading=document.createElement("div");

loading.className="msg bot";

loading.textContent="Thinking...";

messages.appendChild(loading);

messages.scrollTop=messages.scrollHeight;

try{

const response=await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message
})

});

const data=await response.json();

loading.remove();

if(data.reply){

addMessage(data.reply,"bot");

history.push({
user:message,
bot:data.reply
});

renderHistory();

saveChat();

}else{

addMessage(data.error || "No response.","bot");

}

}catch(err){

loading.remove();

addMessage("❌ Network Error: "+err.message,"bot");

}

}

function renderHistory(){

historyDiv.innerHTML="<b>📜 History</b>";

history.forEach(chat=>{

const item=document.createElement("div");

item.className="history-item";

item.textContent=chat.user;

item.onclick=()=>{

addMessage(chat.user,"user");

addMessage(chat.bot,"bot");

};

historyDiv.appendChild(item);

});

}

function saveChat(){

localStorage.setItem("chatHistory",JSON.stringify(history));

}

function clearChat(){

messages.innerHTML="";

history=[];

renderHistory();

localStorage.removeItem("chatHistory");

}

window.onload=()=>{

const saved=localStorage.getItem("chatHistory");

if(saved){

history=JSON.parse(saved);

renderHistory();

}

};

input.addEventListener("keypress",(e)=>{

if(e.key==="Enter"){

sendMessage();

}

});

</script>

</body>
</html>
